<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVIGA — Yacht Selector</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0faf9;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Three.js placeholder canvas — Phase 2 */
#bgCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ══════════════════════════════════════
   PAGE LAYOUT
   ══════════════════════════════════════ */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.page-inner {
  position: relative;
  width: 100%;
  max-width: 1920px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ══════════════════════════════════════
   LOGO
   ══════════════════════════════════════ */
.logo {
  position: absolute;
  top: 60px;
  left: 160px;
  z-index: 1;
  width: 184px;
  height: auto;
}
.logo img {
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* ══════════════════════════════════════
   YACHT PICKER — horizontal drag/snap strip
   ══════════════════════════════════════ */
.yacht-picker-wrapper {
  position: fixed;
  top: 50%;
  left: 0;
  width: 100vw;
  height: 320px;
  transform: translateY(calc(-50% - 40px));
  overflow: visible;
  z-index: 3;
  -webkit-user-select: none;
  user-select: none;
  pointer-events: auto;
}

.yacht-picker-track {
  position: relative;
  width: 100%;
  height: 100%;
  cursor: grab;
}
.yacht-picker-track.dragging { cursor: grabbing; }

.yacht-picker-item {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transform-origin: center center;
  transition: all 0.45s cubic-bezier(0.23,1,0.32,1);
  will-change: transform, width, height, opacity;
}
.yacht-picker-track.dragging .yacht-picker-item,
.yacht-picker-track.no-transition .yacht-picker-item { transition: none !important; }
.yacht-picker-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── Navigation arrows on main image ── */
.yacht-nav {
  position: absolute;
  top: 66%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.25s ease, transform 0.2s ease, background 0.2s ease;
  padding: 0;
}
.yacht-nav svg {
  width: 22px;
  height: 22px;
}
.yacht-visual:hover .yacht-nav {
  opacity: 1;
}
.yacht-nav:hover {
  background: rgba(0,0,0,0.4);
  transform: translateY(-50%) scale(1.08);
}
.yacht-nav:active {
  transform: translateY(-50%) scale(0.95);
}
.yacht-nav-left { left: 16px; }
.yacht-nav-right { right: 16px; }

/* ══════════════════════════════════════
   COUNTRY WATERMARK
   ══════════════════════════════════════ */
.country-watermark {
  position: fixed;
  right: 60px;
  bottom: 40px;
  font-family: 'EB Garamond', serif;
  font-size: 42px;
  font-weight: 500;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: rgba(13, 148, 136, 0.35);
  pointer-events: none;
  z-index: 2;
  transition: opacity 0.6s ease, transform 0.6s ease;
  transform: translateY(0);
}
.country-watermark:empty {
  opacity: 0;
  transform: translateY(10px);
}

/* ══════════════════════════════════════
   MAIN CARD
   ══════════════════════════════════════ */
.main-card {
  position: relative;
  width: 920px;
  background: #fff;
  border-radius: 40px 40px 20px 20px;
  box-shadow: 0px 30px 60px rgba(0,0,0,0.3);
  overflow: hidden;
  z-index: 10;
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   YACHT IMAGE AREA
   ══════════════════════════════════════ */
.yacht-visual {
  position: relative;
  width: 100%;
  height: 637px;
  overflow: hidden;
  border-radius: 40px 40px 0 0;
}
.yacht-visual-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  position: absolute;
  left: 0;
  top: 0;
  z-index: 1;
  transition: opacity 0.5s ease;
  border-radius: 40px 40px 0 0;
}

/* ── Dark gradient overlay at bottom of image ── */
.yacht-visual::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 130px;
  background: linear-gradient(to top, #2f2f2f, rgba(47,47,47,0));
  opacity: 0.6;
  z-index: 3;
  pointer-events: none;
}

/* ── Frosted Header (tabs + slider, 180px) ── */
.frosted-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 180px;
  background: rgba(159,159,159,0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 30px 0;
  gap: 22px;
  border-radius: 40px 40px 0 0;
}

/* ── Country Tabs ── */
.country-tabs {
  display: flex;
  gap: 20px;
}
.country-tab {
  width: 200px;
  height: 36px;
  font-size: 14px;
  font-weight: 400;
  font-family: 'Inter', sans-serif;
  color: #fff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
  white-space: nowrap;
  outline: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.28px;
}
.country-tab:hover {
  background: rgba(255,255,255,0.15);
}
.country-tab.active {
  color: #000;
  background: #fff;
  border-color: #fff;
  font-weight: 500;
}
.country-tab .flag-icon {
  width: 16px;
  height: 16px;
  border-radius: 2px;
  object-fit: cover;
}

/* ══════════════════════════════════════
   MONTH PICKER (inside frosted header, full width)
   ══════════════════════════════════════ */
.picker-wrapper {
  position: relative;
  width: calc(100% + 60px);
  margin: 0 -30px;
  height: 80px;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
/* All months shown at equal opacity — no fade-by-distance */

/* Center selected card */
.center-overlay {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  width: 110px;
  height: 80px;
  background: #fff;
  border: 2px solid #fff;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  z-index: 3;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px 14px;
}
.center-month {
  font-size: 16px;
  font-weight: 500;
  color: #000;
  line-height: 1;
}
.center-bar-track {
  width: 70px;
  height: 4px;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  overflow: hidden;
}
.center-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s cubic-bezier(0.23,1,0.32,1), background 0.3s ease;
}
.center-pct-row {
  display: flex;
  align-items: center;
  gap: 4px;
  line-height: 1;
}
.center-pct {
  font-size: 12px;
  font-weight: 500;
  transition: color 0.3s;
}
.center-pct-label {
  font-size: 12px;
  font-weight: 500;
  transition: color 0.3s;
}

/* Scroll track */
.picker-track {
  display: flex;
  align-items: center;
  height: 100%;
  cursor: grab;
  will-change: transform;
  transition: transform 0.35s cubic-bezier(0.23,1,0.32,1);
  z-index: 2;
  position: relative;
}
.picker-track.dragging { transition: none; cursor: grabbing; }
.picker-track.no-transition { transition: none !important; }

/* Month items — uniform appearance, no fade */
.picker-item {
  flex-shrink: 0;
  width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 6px 0;
  transition: opacity 0.3s ease;
}
.month-name {
  font-size: 14px;
  font-weight: 300;
  color: #fff;
  line-height: 1;
}
.picker-item.selected { opacity: 0; width: 120px; }

.occ-bar-track {
  width: 50px;
  height: 4px;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  overflow: hidden;
}
.occ-bar-fill { height: 100%; border-radius: 4px; }

.occ-pct {
  font-size: 8px;
  font-weight: 400;
  color: #fff;
  line-height: 1;
}

/* ── Yacht Name Overlay ── */
.yacht-name-area {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 160px;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 0;
}
/* Name row: left line + text + right line, all bottom-aligned */
.yacht-name-row {
  display: flex;
  align-items: baseline;
  width: 100%;
  padding: 0 40px;
  margin-bottom: 14px;
  position: relative;
  z-index: 2;
}
.yacht-name-line {
  width: 170px;
  flex-shrink: 0;
  height: 1px;
  background: rgba(255,255,255,0.7);
  position: relative;
  top: -6px;
}
.yacht-name-text {
  font-family: 'EB Garamond', serif;
  font-size: 56px;
  font-weight: 600;
  color: #fff;
  text-transform: none;
  letter-spacing: 1.12px;
  text-align: center;
  line-height: normal;
  transition: opacity 0.4s ease;
  flex: 1;
  padding: 0 20px;
  white-space: nowrap;
}

/* ══════════════════════════════════════
   DASHBOARD
   ══════════════════════════════════════ */
.dashboard {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 28px 40px 24px;
  gap: 60px;
}
.dashboard-divider-mobile {
  display: none;
}

/* Left: Specs */
.specs-left {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 170px;
  flex-shrink: 0;
}
.spec-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 400;
  line-height: 1;
  gap: 12px;
}
.spec-label {
  color: rgba(0,0,0,0.6);
  font-weight: 400;
}
.spec-value {
  color: #000;
  font-weight: 400;
  text-align: right;
}

/* Center: Stats — fixed width matching yacht name area */
.specs-center {
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: center;
  flex-shrink: 0;
  gap: 10px;
}
.stat-block {
  text-align: center;
  width: 120px;
}
.stat-number {
  font-size: 48px;
  font-weight: 700;
  color: #000;
  line-height: 1;
}
.stat-label {
  font-size: 16px;
  font-weight: 400;
  color: #000;
  letter-spacing: 0.96px;
  margin-top: 4px;
}

/* Right: Amenities */
.specs-right {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 170px;
  flex-shrink: 0;
}
.amenity {
  font-size: 14px;
  color: #000;
  font-weight: 400;
  line-height: 1;
}
.amenity.more {
  color: rgba(0,0,0,0.45);
}

/* ══════════════════════════════════════
   CTA — Golden gradient bar
   ══════════════════════════════════════ */
.cta-area {
  padding: 0;
  position: relative;
}
.cta-bar {
  width: 100%;
  height: 93px;
  background: linear-gradient(to top, #e5a15c, #ffd26b);
  border-radius: 0 0 20px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cta-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: #000;
  letter-spacing: 0.4px;
  border: none;
  background: none;
  transition: background 0.2s ease;
}
/* Center CTA — wider */
.cta-section.cta-primary {
  flex: 2.4;
}
.cta-section:hover {
  background: rgba(0,0,0,0.06);
}
.cta-section:active {
  background: rgba(0,0,0,0.12);
}
.cta-section:first-child {
  border-radius: 0 0 0 20px;
}
.cta-section:last-child {
  border-radius: 0 0 20px 0;
}
.cta-divider {
  width: 1px;
  height: 50px;
  background: rgba(0,0,0,0.15);
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   CONTACT PANEL — "Button Clicked" overlay
   ══════════════════════════════════════ */
.contact-panel {
  position: absolute;
  inset: 0;
  z-index: 15;
  background: linear-gradient(to top, #ffb76d, #ffe09b 79.6%);
  border-radius: 40px 40px 20px 20px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none; /* Firefox */
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
              opacity 0.3s ease;
  will-change: transform;
}
.contact-panel.active {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.contact-panel::-webkit-scrollbar { display: none; }

/* Compressed yacht image */
.contact-yacht-image {
  position: relative;
  width: 100%;
  height: 200px;
  overflow: hidden;
  border-radius: 40px 40px 0 0;
  flex-shrink: 0;
}
.contact-yacht-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.contact-yacht-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 130px;
  background: linear-gradient(to top, rgba(47,47,47,0.6), transparent);
  pointer-events: none;
}
.contact-yacht-name {
  position: absolute;
  bottom: 20px;
  left: 40px;
  font-family: 'EB Garamond', serif;
  font-size: 56px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 1.12px;
  line-height: 1;
  z-index: 1;
}
.contact-yacht-line {
  position: absolute;
  bottom: 28px;
  right: 40px;
  width: 480px;
  height: 2px;
  background: rgba(255,255,255,0.5);
  z-index: 1;
}
/* Desktop: X close on image is HIDDEN (use header close instead) */
@media (min-width: 601px) {
  .contact-close-mobile { display: none; }
}
.contact-close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: background 0.2s;
}
.contact-close-btn:hover { background: rgba(0,0,0,0.5); }

/* White content header — Figma: 187px white rectangle */
.contact-header {
  background: #fff;
  min-height: 187px;
  padding: 28px 40px 20px;
  flex-shrink: 0;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.contact-title-line1 {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: #000;
}
.contact-title-line2 {
  font-family: 'EB Garamond', serif;
  font-size: 54px;
  font-weight: 600;
  font-style: italic;
  color: #000;
  line-height: 1.1;
}
.contact-description {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 400;
  color: #000;
  margin-top: 8px;
}
.contact-header-close {
  position: absolute;
  top: 24px;
  right: 40px;
  width: 20px;
  height: 20px;
  border: none;
  background: none;
  cursor: pointer;
  opacity: 0.3;
  padding: 0;
  transition: opacity 0.2s;
}
.contact-header-close:hover { opacity: 0.6; }

/* Contact option cards — 2-col grid */
.contact-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 10px 40px 20px;
  flex: 1 0 auto;
}
.contact-card {
  display: flex;
  align-items: center;
  gap: 14px;
  height: 110px;
  padding: 0 20px;
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.4);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  text-align: left;
  font-family: 'Inter', sans-serif;
}
.contact-card:hover {
  background: rgba(255,255,255,0.35);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.5);
}
.contact-card-full { grid-column: 1 / -1; }
.contact-card-icon {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  background: rgba(255,255,255,0.6);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.contact-card-icon img, .contact-card-icon svg {
  width: 38px;
  height: 38px;
}
.contact-card-text { flex: 1; min-width: 0; }
.contact-card-title {
  font-size: 20px;
  font-weight: 700;
  color: #000;
}
.contact-card-subtitle {
  font-size: 16px;
  font-weight: 400;
  color: rgba(0,0,0,0.4);
  margin-top: 2px;
}
.contact-card-chevron {
  flex-shrink: 0;
  width: 8px;
  height: 16px;
  opacity: 0.5;
}

/* Bottom bar */
.contact-bottom {
  padding: 16px 40px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: auto;
  flex-shrink: 0;
}
.contact-go-back {
  width: 190px;
  height: 73px;
  background: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.4);
  border-radius: 0 20px 20px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 500;
  color: rgba(0,0,0,0.8);
  cursor: pointer;
  flex-shrink: 0;
  letter-spacing: 0.4px;
  transition: background 0.2s;
}
.contact-go-back:hover { background: rgba(255,255,255,0.6); }
.contact-live-bar {
  flex: 1;
  height: 50px;
  background: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.4);
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  color: #000;
}
.contact-live-bar strong { font-weight: 700; }
.contact-live-icon {
  width: 50px;
  height: 50px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
}

/* ── Offline state ── */
.contact-panel.offline .contact-card[data-action="whatsapp"],
.contact-panel.offline .contact-card[data-action="facetime"],
.contact-panel.offline .contact-card[data-action="googlemeet"],
.contact-panel.offline .contact-card[data-action="phone"] {
  background: rgba(210,163,104,0.2);
  border-color: rgba(210,163,104,0.15);
  box-shadow: none;
  cursor: default;
  pointer-events: none;
}
.contact-panel.offline .contact-card[data-action="whatsapp"] .contact-card-icon,
.contact-panel.offline .contact-card[data-action="facetime"] .contact-card-icon,
.contact-panel.offline .contact-card[data-action="googlemeet"] .contact-card-icon,
.contact-panel.offline .contact-card[data-action="phone"] .contact-card-icon {
  background: rgba(255,255,255,0.1);
}

<!-- Three.js background — dot wave -->
<canvas id="bgCanvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const canvas = document.getElementById('bgCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();

  // Soft gradient background mesh
  const bgGeo = new THREE.PlaneGeometry(2, 2);
  const bgMat = new THREE.ShaderMaterial({
    depthWrite: false,
    uniforms: {
      uColor1: { value: new THREE.Color(0xd2fffc) },
      uColor2: { value: new THREE.Color(0xf8fffe) },
    },
    vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }',
    fragmentShader: 'uniform vec3 uColor1; uniform vec3 uColor2; varying vec2 vUv; void main(){ gl_FragColor=vec4(mix(uColor1,uColor2,vUv.y),1.0); }',
  });
  const bgMesh = new THREE.Mesh(bgGeo, bgMat);
  bgMesh.renderOrder = -1;
  scene.add(bgMesh);

  // Camera
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
  camera.position.set(0, 6, 14);
  camera.lookAt(0, 0, 0);

  // Dot grid — tight spacing, high contrast
  const cols = 180;
  const rows = 110;
  const spacing = 0.15;
  const count = cols * rows;

  const geometry = new THREE.BufferGeometry();
  const basePositions = new Float32Array(count * 3);
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  const baseColor = new THREE.Color(0x2d7a73);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const i = idx * 3;
      basePositions[i]     = (c - cols / 2) * spacing;
      basePositions[i + 1] = 0;
      basePositions[i + 2] = (r - rows / 2) * spacing;
      positions[i]     = basePositions[i];
      positions[i + 1] = 0;
      positions[i + 2] = basePositions[i + 2];
      colors[i]     = baseColor.r;
      colors[i + 1] = baseColor.g;
      colors[i + 2] = baseColor.b;
      sizes[idx] = 1.0;
    }
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  // Custom shader material for per-point size + color
  const dotMat = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: {
      uBaseSize: { value: 0.05 },
      uOpacity: { value: 0.95 },
      uPixelRatio: { value: renderer.getPixelRatio() },
    },
    vertexShader: [
      'attribute float size;',
      'varying vec3 vColor;',
      'uniform float uBaseSize;',
      'uniform float uPixelRatio;',
      'void main() {',
      '  vColor = color;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = size * uBaseSize * uPixelRatio * (300.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}',
    ].join('\n'),
    fragmentShader: [
      'uniform float uOpacity;',
      'varying vec3 vColor;',
      'void main() {',
      '  float d = length(gl_PointCoord - 0.5);',
      '  if (d > 0.5) discard;',
      '  float a = smoothstep(0.5, 0.35, d);',
      '  gl_FragColor = vec4(vColor, a * uOpacity);',
      '}',
    ].join('\n'),
    vertexColors: true,
  });

  const dots = new THREE.Points(geometry, dotMat);
  scene.add(dots);

  /* ── Country coastline outlines ──
     Rendered as dotted coastline + harbor pins on the RIGHT/BOTTOM margin.
     Coords in positive x (right side of screen). */

  const countryData = {
    turkey: {
      label: 'TURKEY',
      // Turkish Aegean + Med coast — right side, lower area
      outline: [
        [7.5,1.0],[7.9,1.6],[8.3,2.0],[8.0,2.5],[7.6,2.9],
        [8.0,3.3],[8.5,3.7],[8.1,4.1],[7.7,4.5],[8.2,4.8],
        [8.7,5.1],[8.3,5.4],[7.8,5.0],[7.4,4.6],[7.8,4.2],
        [8.2,3.8],[8.6,3.4],[9.0,3.7],[9.4,4.0],[9.8,3.7],
        [10.2,4.0],[10.6,4.3],[11.0,4.0],[11.4,4.3],[11.8,4.6],
      ],
      harbors: {
        'Bodrum':   [8.2, 4.8],
        'Marmaris': [8.7, 5.1],
        'Fethiye':  [9.4, 4.0],
        'Gocek':    [9.8, 3.7],
        'Antalya':  [11.4, 4.3],
      },
    },
    greece: {
      label: 'GREECE',
      // Greek coast — right side
      outline: [
        [7.0,0.5],[7.4,1.2],[7.1,1.8],[6.7,2.4],[7.1,3.0],
        [7.6,3.5],[8.0,4.0],[7.6,4.5],[7.1,4.9],[7.5,5.3],
        [8.0,5.7],[8.5,5.3],[9.0,4.8],[8.6,4.3],[8.1,3.8],
        [7.7,3.3],[8.1,2.8],[8.5,2.3],[8.1,1.7],[7.6,1.2],
      ],
      harbors: {
        'Athens':    [8.5, 2.3],
        'Mykonos':  [9.0, 4.8],
        'Santorini':[8.6, 4.3],
        'Corfu':    [6.7, 2.4],
        'Rhodes':   [8.0, 5.7],
      },
    },
    croatia: {
      label: 'CROATIA',
      // Croatian Adriatic coast — right side
      outline: [
        [6.0,-0.5],[6.4,0.2],[6.1,0.9],[6.5,1.5],[6.2,2.1],
        [5.8,2.7],[6.2,3.3],[6.7,3.8],[6.3,4.3],[5.9,4.8],
        [5.5,5.3],[5.9,5.8],[6.3,6.3],[5.9,6.8],[5.5,7.3],
      ],
      harbors: {
        'Dubrovnik': [6.3, 4.3],
        'Split':     [5.8, 2.7],
        'Hvar':      [6.2, 3.3],
        'Zadar':     [6.1, 0.9],
      },
    },
  };

  // Interpolate outline for denser coastline
  function interpolateOutline(pts, density) {
    const result = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const [x0, z0] = pts[i];
      const [x1, z1] = pts[i + 1];
      const dist = Math.sqrt((x1 - x0) ** 2 + (z1 - z0) ** 2);
      const steps = Math.max(3, Math.round(dist * density));
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        result.push([x0 + (x1 - x0) * t, z0 + (z1 - z0) * t]);
      }
    }
    result.push(pts[pts.length - 1]);
    return result;
  }

  // Build country objects: coastline (line) + harbor pins (large dots) + harbor rings
  const countryObjects = {};

  Object.keys(countryData).forEach(key => {
    const cd = countryData[key];

    // ── Coastline as a thick dotted line ──
    const coastPts = interpolateOutline(cd.outline, 12);
    const cGeo = new THREE.BufferGeometry();
    const cPos = new Float32Array(coastPts.length * 3);
    coastPts.forEach((p, i) => {
      cPos[i * 3] = p[0];
      cPos[i * 3 + 1] = 0.15;
      cPos[i * 3 + 2] = p[1];
    });
    cGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
    const cMat = new THREE.PointsMaterial({
      color: 0x0d9488, size: 0.12, sizeAttenuation: true,
      transparent: true, opacity: 0,
    });
    const cPoints = new THREE.Points(cGeo, cMat);
    scene.add(cPoints);

    // ── Harbor pins — bright teal, much larger ──
    const harborEntries = Object.entries(cd.harbors);
    const hGeo = new THREE.BufferGeometry();
    const hPos = new Float32Array(harborEntries.length * 3);
    harborEntries.forEach(([name, p], i) => {
      hPos[i * 3] = p[0];
      hPos[i * 3 + 1] = 0.25;
      hPos[i * 3 + 2] = p[1];
    });
    hGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3));
    const hMat = new THREE.PointsMaterial({
      color: 0xffffff, size: 0.35, sizeAttenuation: true,
      transparent: true, opacity: 0,
    });
    const hPoints = new THREE.Points(hGeo, hMat);
    scene.add(hPoints);

    // ── Harbor pulse rings — expanding circle per harbor ──
    const ringGeos = [];
    const ringMeshes = [];
    harborEntries.forEach(([name, p]) => {
      const ringGeo = new THREE.RingGeometry(0.08, 0.12, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x0d9488, transparent: true, opacity: 0, side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.set(p[0], 0.2, p[1]);
      ring.rotation.x = -Math.PI / 2;
      scene.add(ring);
      ringGeos.push(ringGeo);
      ringMeshes.push({ mesh: ring, mat: ringMat, baseX: p[0], baseZ: p[1] });
    });

    countryObjects[key] = {
      coast: { geo: cGeo, mat: cMat, points: cPoints, basePos: cPos },
      harbor: { geo: hGeo, mat: hMat, points: hPoints, basePos: hPos },
      rings: ringMeshes,
    };
  });

  // Country transition state
  let activeCountry = 'all';
  let countryTargetAlpha = {};
  Object.keys(countryData).forEach(k => { countryTargetAlpha[k] = 0; });

  window.setBgCountry = function(country) {
    activeCountry = country;
    Object.keys(countryData).forEach(k => {
      countryTargetAlpha[k] = (country !== 'all' && k === country) ? 1.0 : 0;
    });
    // Update watermark label
    const wm = document.getElementById('countryWatermark');
    if (wm) {
      if (country !== 'all' && countryData[country]) {
        wm.textContent = countryData[country].label;
      } else {
        wm.textContent = '';
      }
    }
  };

  // Resize
  function onResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    dotMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
  }
  onResize();
  window.addEventListener('resize', onResize);

  // Helper: wave Y at a world position
  function waveY(bx, bz, t) {
    return Math.sin(bx * 1.2 + t * 1.2) * 0.12
         + Math.sin(bz * 0.9 + t * 0.9) * 0.1
         + Math.sin((bx + bz) * 0.7 + t * 0.7) * 0.07
         + Math.sin(bx * 2.5 - t * 1.5) * 0.04;
  }

  // Animation loop
  function animate(time) {
    requestAnimationFrame(animate);
    const t = time * 0.001;

    // Animate ocean dot grid
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const i = (r * cols + c) * 3;
        positions[i + 1] = waveY(basePositions[i], basePositions[i + 2], t);
      }
    }
    geometry.attributes.position.needsUpdate = true;

    // Animate country overlays
    Object.keys(countryData).forEach(k => {
      const obj = countryObjects[k];
      const target = countryTargetAlpha[k];
      const coast = obj.coast;
      const harbor = obj.harbor;

      // Smooth lerp
      coast.mat.opacity += (target * 0.9 - coast.mat.opacity) * 0.08;
      harbor.mat.opacity += (target * 1.0 - harbor.mat.opacity) * 0.08;

      // Coastline rides the waves
      if (coast.mat.opacity > 0.005) {
        const cp = coast.geo.attributes.position.array;
        for (let i = 0; i < cp.length; i += 3) {
          cp[i + 1] = waveY(coast.basePos[i], coast.basePos[i + 2], t) + 0.15;
        }
        coast.geo.attributes.position.needsUpdate = true;
      }

      // Harbor pins ride waves + gentle bob
      if (harbor.mat.opacity > 0.005) {
        const hp = harbor.geo.attributes.position.array;
        for (let i = 0; i < hp.length; i += 3) {
          hp[i + 1] = waveY(harbor.basePos[i], harbor.basePos[i + 2], t) + 0.3
                    + Math.sin(t * 1.8 + i) * 0.04;
        }
        harbor.geo.attributes.position.needsUpdate = true;
      }

      // Pulse rings
      obj.rings.forEach((r, ri) => {
        const ringAlpha = coast.mat.opacity;
        r.mat.opacity = ringAlpha * 0.6 * (0.5 + 0.5 * Math.sin(t * 2.0 + ri * 1.5));
        const pulse = 1.0 + 0.3 * Math.sin(t * 2.0 + ri * 1.5);
        r.mesh.scale.set(pulse, pulse, 1);
        r.mesh.position.y = waveY(r.baseX, r.baseZ, t) + 0.22;
      });
    });

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);
})();
</script>

function buildMonths(country) {
  const occ = occData[country] || occData.all;
  return monthNames.map((m, i) => ({ ...m, occ: occ[i] }));
}

function getYachts(country, monthIdx) {
  let pool = [];
  if (country === 'all') {
    // Turkey first so Dea Del Mare is the default hero yacht
    ['turkey', 'greece', 'croatia'].forEach(c => pool.push(...yachtDB[c]));
  } else {
    pool = yachtDB[country] || [];
  }
  const available = pool.filter(y => y.months.includes(monthIdx));
  return available.length > 0 ? available : pool.slice(0, 3);
}

/* ══════════════════════════════════════
   OCCUPANCY COLOR
   ══════════════════════════════════════ */
function occColor(pct) {
  // Green → Yellow → Orange → Red
  if (pct <= 30) return '#c7ff39';
  if (pct <= 50) return '#ffdb39';
  if (pct <= 70) return '#ff7e39';
  if (pct <= 85) return '#ff3946';
  return '#ff0000';
}

/* ══════════════════════════════════════
   MONTH PICKER (from ios-horizontal-picker-demo)
   ══════════════════════════════════════ */
let months = buildMonths('all');

function createMonthItem(m) {
  const el = document.createElement('div');
  el.className = 'picker-item';
  const barW = Math.max(10, m.occ) + '%';
  el.innerHTML =
    '<div class="month-name">' + m.name + '</div>' +
    '<div class="occ-bar-track"><div class="occ-bar-fill" style="width:' + barW + ';background:' + occColor(m.occ) + '"></div></div>' +
    '<div class="occ-pct">' + m.occ + '%</div>';
  return el;
}

function createMonthPicker(wrapperId, data_, defaultIndex, onChange) {
  let data = data_;
  const wrapper = document.getElementById(wrapperId);
  const track = wrapper.querySelector('.picker-track');
  const smallWidth = 80;
  const bigWidth = 120;
  let wrapperCenter = wrapper.offsetWidth / 2;
  const N = data.length;
  const copies = 5;
  const totalItems = N * copies;
  const centerCopyStart = N * 2;

  for (let c = 0; c < copies; c++) {
    data.forEach(m => track.appendChild(createMonthItem(m)));
  }

  const allItems = track.querySelectorAll('.picker-item');
  let virtualIndex = centerCopyStart + defaultIndex;
  let startX = 0, startTranslate = 0, isDragging = false, hasMoved = false;

  // Recalculate center on resize so items stay aligned at all viewport widths
  function refreshCenter() {
    wrapperCenter = wrapper.offsetWidth / 2;
  }
  window.addEventListener('resize', function() {
    refreshCenter();
    // Re-snap to current position with updated center
    track.classList.add('no-transition');
    track.style.transform = 'translateX(' + getTranslate(virtualIndex) + 'px)';
    track.offsetHeight;
    track.classList.remove('no-transition');
  });

  function getTranslate(vi) {
    return wrapperCenter - (vi * smallWidth + bigWidth / 2);
  }
  function getDragTranslate(vi) {
    return wrapperCenter - (vi * smallWidth + smallWidth / 2);
  }
  function realIndex(vi) {
    return ((vi % N) + N) % N;
  }

  function recenter() {
    const ri = realIndex(virtualIndex);
    const newVi = centerCopyStart + ri;
    if (newVi === virtualIndex) return;
    virtualIndex = newVi;
    track.classList.add('no-transition');
    updateStyles(virtualIndex);
    track.style.transform = 'translateX(' + getTranslate(virtualIndex) + 'px)';
    track.offsetHeight; // force reflow
    track.classList.remove('no-transition');
  }

  // All items same opacity — no fade-by-distance
  function updateStyles(vi) {
    allItems.forEach((el, i) => {
      el.classList.remove('selected');
      if (i === vi) {
        el.classList.add('selected');
      }
      el.style.opacity = '';
      el.style.transform = '';
    });
  }

  function snapTo(vi) {
    vi = Math.max(N, Math.min(totalItems - N - 1, vi));
    virtualIndex = vi;
    updateStyles(vi);
    track.style.transform = 'translateX(' + getTranslate(vi) + 'px)';
    onChange(data[realIndex(vi)], realIndex(vi));
  }

  function snapToAnimated(vi) {
    snapTo(vi);
    setTimeout(recenter, 380);
  }

  function onPointerDown(e) {
    recenter();
    isDragging = true;
    hasMoved = false;
    startX = e.clientX || e.touches?.[0]?.clientX || 0;
    allItems.forEach(el => el.classList.remove('selected'));
    startTranslate = getDragTranslate(virtualIndex);
    track.classList.add('dragging');
    track.style.transform = 'translateX(' + startTranslate + 'px)';
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!isDragging) return;
    const x = e.clientX || e.touches?.[0]?.clientX || 0;
    const diff = x - startX;
    if (Math.abs(diff) > 3) hasMoved = true;
    track.style.transform = 'translateX(' + (startTranslate + diff) + 'px)';
    const rawVi = (wrapperCenter - (startTranslate + diff)) / smallWidth - 0.5;
    const nearest = Math.round(rawVi);
    if (nearest >= 0 && nearest < totalItems) {
      allItems.forEach((el, i) => {
        el.classList.remove('selected');
        const dist = Math.abs(i - nearest);
        const op = dist < distOpacity.length ? distOpacity[dist] : 0.05;
        el.style.opacity = op;
      });
      onChange(data[realIndex(nearest)], realIndex(nearest));
    }
  }

  function onPointerUp() {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');
    const match = track.style.transform.match(/translateX\((.+?)px\)/);
    const cur = match ? parseFloat(match[1]) : startTranslate;
    snapToAnimated(Math.round((wrapperCenter - cur) / smallWidth - 0.5));
  }

  track.addEventListener('click', e => {
    if (hasMoved) return;
    const item = e.target.closest('.picker-item');
    if (!item) return;
    const ci = Array.from(allItems).indexOf(item);
    if (ci >= 0) snapToAnimated(ci);
  });

  wrapper.addEventListener('mousedown', onPointerDown);
  wrapper.addEventListener('touchstart', onPointerDown, { passive: false });
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchend', onPointerUp);

  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const dir = e.deltaX !== 0 ? Math.sign(e.deltaX) : Math.sign(e.deltaY);
    snapToAnimated(virtualIndex + dir);
  }, { passive: false });

  snapTo(virtualIndex);

  function updateData(newData) {
    data = newData;
    allItems.forEach((el, i) => {
      const ri = realIndex(i);
      const m = data[ri];
      el.querySelector('.month-name').textContent = m.name;
      el.querySelector('.occ-pct').textContent = m.occ + '%';
      const fill = el.querySelector('.occ-bar-fill');
      fill.style.width = Math.max(10, m.occ) + '%';
      fill.style.background = occColor(m.occ);
    });
    onChange(data[realIndex(virtualIndex)], realIndex(virtualIndex));
  }

  return {
    snapTo: ri => snapToAnimated(centerCopyStart + ri),
    getValue: () => data[realIndex(virtualIndex)],
    updateData,
  };
}

/* ══════════════════════════════════════
   YACHT PICKER — same pattern as month picker
   ══════════════════════════════════════ */
let currentYachts = [];
let activeYacht = 0;
let currentCountry = 'all';
let currentMonthIdx = 6; // July default
let yachtPicker = null;

function createYachtItem(yacht) {
  const el = document.createElement('div');
  el.className = 'yacht-picker-item';
  const img = document.createElement('img');
  img.src = yacht.img;
  img.alt = yacht.name;
  img.loading = 'lazy';
  el.appendChild(img);
  return el;
}

function createYachtPicker(wrapperId, data_, defaultIndex, onChange) {
  let data = data_;
  const wrapper = document.getElementById(wrapperId);
  const track = document.getElementById('yachtPickerTrack');
  track.innerHTML = '';

  // Distance-based specs from Figma (d0 = selected/hidden, d1-d4 = visible)
  const distSpecs = [
    { w: 328, h: 421, r: 20, offset: 0 },    // d0: selected (hidden)
    { w: 328, h: 421, r: 20, offset: 371 },   // d1: closest
    { w: 272, h: 351, r: 20, offset: 449 },   // d2
    { w: 200, h: 257, r: 10, offset: 505 },   // d3
    { w: 154, h: 197, r: 10, offset: 538 },   // d4: farthest
  ];
  const maxDist = 4;

  const N = data.length;
  if (N === 0) return null;
  const copies = 5;
  const totalItems = N * copies;
  const centerCopyStart = N * 2;

  for (let c = 0; c < copies; c++) {
    data.forEach(y => track.appendChild(createYachtItem(y)));
  }

  let allItems = Array.from(track.querySelectorAll('.yacht-picker-item'));
  let virtualIndex = centerCopyStart + defaultIndex;
  let startX = 0, dragOffset = 0, isDragging = false, hasMoved = false;

  function realIndex(vi) {
    return ((vi % N) + N) % N;
  }

  function positionItems(centerVi, fractional) {
    // fractional: 0 = snapped, negative = dragging left, positive = dragging right
    allItems.forEach((el, i) => {
      const rawDist = i - centerVi + (fractional || 0);
      const absDist = Math.abs(rawDist);
      const side = rawDist < 0 ? -1 : 1; // -1 = left, +1 = right

      if (absDist < 0.01) {
        // Selected item — hidden behind main card
        el.style.width = distSpecs[0].w + 'px';
        el.style.height = distSpecs[0].h + 'px';
        el.style.opacity = '0';
        el.style.zIndex = '5';
        el.style.borderRadius = distSpecs[0].r + 'px';
        el.style.transform = 'translate(-50%, -50%)';
        el.style.pointerEvents = 'none';
        return;
      }

      if (absDist > maxDist + 0.5) {
        // Beyond visible range
        el.style.opacity = '0';
        el.style.pointerEvents = 'none';
        el.style.transform = 'translate(-50%, -50%) translateX(' + (side * 600) + 'px)';
        return;
      }

      // Interpolate between distance slots for smooth dragging
      const floor = Math.max(1, Math.floor(absDist));
      const ceil = Math.min(maxDist, Math.ceil(absDist));
      const t = absDist - Math.floor(absDist);

      const s0 = distSpecs[floor];
      const s1 = floor === ceil ? s0 : distSpecs[ceil];

      const w = s0.w + (s1.w - s0.w) * t;
      const h = s0.h + (s1.h - s0.h) * t;
      const r = s0.r + (s1.r - s0.r) * t;
      const off = s0.offset + (s1.offset - s0.offset) * t;
      const z = maxDist + 1 - Math.round(absDist);

      // Fade out beyond max distance
      let opacity = 1;
      if (absDist > maxDist) {
        opacity = Math.max(0, 1 - (absDist - maxDist) * 2);
      }

      el.style.width = Math.round(w) + 'px';
      el.style.height = Math.round(h) + 'px';
      el.style.opacity = opacity;
      el.style.zIndex = z;
      el.style.borderRadius = Math.round(r) + 'px';
      el.style.transform = 'translate(-50%, -50%) translateX(' + (side * off) + 'px)';
      el.style.pointerEvents = opacity > 0.3 ? 'auto' : 'none';
    });
  }

  function recenter() {
    const ri = realIndex(virtualIndex);
    const newVi = centerCopyStart + ri;
    if (newVi === virtualIndex) return;
    virtualIndex = newVi;
    track.classList.add('no-transition');
    positionItems(virtualIndex, 0);
    void track.offsetHeight;
    track.classList.remove('no-transition');
  }

  function snapTo(vi) {
    vi = Math.max(N, Math.min(totalItems - N - 1, vi));
    virtualIndex = vi;
    positionItems(vi, 0);
    onChange(data[realIndex(vi)], realIndex(vi));
  }

  function snapToAnimated(vi) {
    vi = Math.max(N, Math.min(totalItems - N - 1, vi));
    virtualIndex = vi;
    track.classList.remove('no-transition');
    positionItems(vi, 0);
    onChange(data[realIndex(vi)], realIndex(vi));
    setTimeout(recenter, 500);
  }

  let pointerDown = false;

  function onPointerDown(e) {
    pointerDown = true;
    isDragging = false;
    hasMoved = false;
    startX = e.clientX || e.touches?.[0]?.clientX || 0;
    dragOffset = 0;
    if (e.type === 'touchstart') e.preventDefault();
  }

  function enterDragMode(currentX) {
    recenter();
    isDragging = true;
    startX = currentX;
    dragOffset = 0;
    track.classList.add('dragging');
  }

  function onPointerMove(e) {
    if (!pointerDown) return;
    const x = e.clientX || e.touches?.[0]?.clientX || 0;
    if (!isDragging) {
      if (Math.abs(x - startX) > 5) {
        hasMoved = true;
        enterDragMode(x);
      }
      return;
    }
    const diff = x - startX;
    // Convert pixel drag to fractional item offset
    // ~200px drag = 1 item shift (tuned for feel)
    const fractional = -diff / 200;
    dragOffset = fractional;
    positionItems(virtualIndex, fractional);

    // Update main card preview during drag
    const nearest = Math.round(virtualIndex + fractional);
    if (nearest >= 0 && nearest < totalItems) {
      onChange(data[realIndex(nearest)], realIndex(nearest));
    }
  }

  function onPointerUp(e) {
    if (!pointerDown) return;
    pointerDown = false;
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');
    const targetVi = Math.round(virtualIndex + dragOffset);
    snapToAnimated(targetVi);
  }

  track.addEventListener('click', e => {
    if (hasMoved) return;
    const item = e.target.closest('.yacht-picker-item');
    if (!item) return;
    const ci = allItems.indexOf(item);
    if (ci >= 0 && ci !== virtualIndex) snapToAnimated(ci);
  });

  wrapper.addEventListener('mousedown', onPointerDown);
  wrapper.addEventListener('touchstart', onPointerDown, { passive: false });
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchend', onPointerUp);

  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const dir = e.deltaX !== 0 ? Math.sign(e.deltaX) : Math.sign(e.deltaY);
    snapToAnimated(virtualIndex + dir);
  }, { passive: false });

  snapTo(virtualIndex);

  return {
    snapTo: ri => snapToAnimated(centerCopyStart + ri),
    getValue: () => data[realIndex(virtualIndex)],
    rebuild(newData) {
      data = newData;
      track.innerHTML = '';
      for (let c = 0; c < copies; c++) {
        data.forEach(y => track.appendChild(createYachtItem(y)));
      }
      allItems = Array.from(track.querySelectorAll('.yacht-picker-item'));
      virtualIndex = centerCopyStart + 0;
      snapTo(virtualIndex);
    },
  };
}

// Cross-dissolve state
let crossDissolveLayer = 'A'; // which layer is currently visible

function updateYachtDetail(yacht) {
  if (!yacht) return;

  // Cross-dissolve: fade new image in on top while old fades out
  const imgA = document.getElementById('yachtImgA');
  const imgB = document.getElementById('yachtImgB');
  const currentImg = crossDissolveLayer === 'A' ? imgA : imgB;
  const nextImg = crossDissolveLayer === 'A' ? imgB : imgA;

  if (currentImg.src && !currentImg.src.endsWith('/') && currentImg.getAttribute('data-current') !== yacht.img) {
    const fromSrc = currentImg.src;
    const isMobile = window.innerWidth <= 600;
    const fxActive = !isMobile
                   && typeof triggerTransition === 'function' && fromSrc
                   && document.getElementById('fxSelect')
                   && document.getElementById('fxSelect').value !== 'none';

    if (fxActive) {
      // Canvas transition: preload next image silently, swap underneath once canvas is up
      triggerTransition(fromSrc, yacht.img, function onCanvasReady() {
        nextImg.src = yacht.img;
        nextImg.setAttribute('data-current', yacht.img);
        currentImg.removeAttribute('data-current');
        nextImg.style.transition = 'none';
        nextImg.style.zIndex = '2';
        currentImg.style.zIndex = '1';
        nextImg.style.opacity = '1';
        currentImg.style.opacity = '0';
        void nextImg.offsetHeight;
        nextImg.style.transition = '';
        currentImg.style.transition = '';
      });
    } else {
      // CSS cross-dissolve (no canvas effect)
      nextImg.src = yacht.img;
      nextImg.setAttribute('data-current', yacht.img);
      currentImg.removeAttribute('data-current');
      nextImg.style.zIndex = '2';
      currentImg.style.zIndex = '1';
      nextImg.style.opacity = '1';
      currentImg.style.opacity = '0';
    }
    crossDissolveLayer = crossDissolveLayer === 'A' ? 'B' : 'A';
  } else if (!currentImg.getAttribute('data-current')) {
    // First load — no transition
    currentImg.src = yacht.img;
    currentImg.setAttribute('data-current', yacht.img);
    currentImg.style.opacity = '1';
  }

  // Update name (both desktop + mobile elements)
  document.getElementById('yachtName').textContent = yacht.name;
  document.getElementById('yachtNameMobile').textContent = yacht.name;

  // Specs left
  document.getElementById('specsLeft').innerHTML =
    '<div class="spec-row"><span class="spec-label">Model</span><span class="spec-value">' + yacht.model + '</span></div>' +
    '<div class="spec-row"><span class="spec-label">Ölçüler</span><span class="spec-value">' + yacht.size + '</span></div>' +
    '<div class="spec-row"><span class="spec-label">Motor</span><span class="spec-value">' + yacht.motor + '</span></div>' +
    '<div class="spec-row"><span class="spec-label">Üretim /R</span><span class="spec-value">' + yacht.year + '</span></div>' +
    '<div class="spec-row"><span class="spec-label">Liman</span><span class="spec-value">' + yacht.port + '</span></div>';

  // Stats center
  document.getElementById('specsCenter').innerHTML =
    '<div class="stat-block"><div class="stat-number">' + yacht.cabins + '</div><div class="stat-label">Kabin</div></div>' +
    '<div class="stat-block"><div class="stat-number">' + yacht.guests + '</div><div class="stat-label">Misafir</div></div>' +
    '<div class="stat-block"><div class="stat-number">' + yacht.crew + '</div><div class="stat-label">Mürettebat</div></div>';

  // Amenities right
  const max = 4;
  const a = yacht.amenities || [];
  let html = a.slice(0, max).map(x => '<div class="amenity">' + x + '</div>').join('');
  if (a.length > max) html += '<div class="amenity more">+' + (a.length - max) + ' Fazlası</div>';
  document.getElementById('specsRight').innerHTML = html;

  // Country watermark managed by setBgCountry()

  // Update mobile carousel peek images (prev/next yacht slivers)
  if (currentYachts.length > 1) {
    var currentIdx = currentYachts.indexOf(yacht);
    if (currentIdx < 0) currentIdx = 0;
    var prevIdx = (currentIdx - 1 + currentYachts.length) % currentYachts.length;
    var nextIdx = (currentIdx + 1) % currentYachts.length;
    var peekL = document.getElementById('peekLeft');
    var peekR = document.getElementById('peekRight');
    if (peekL) peekL.style.backgroundImage = 'url(' + currentYachts[prevIdx].img + ')';
    if (peekR) peekR.style.backgroundImage = 'url(' + currentYachts[nextIdx].img + ')';
  }
}

function refreshYachts() {
  currentYachts = getYachts(currentCountry, currentMonthIdx);
  activeYacht = 0;
  // Rebuild picker with new yacht data
  yachtPicker = createYachtPicker('yachtPickerWrapper', currentYachts, 0, function(yacht, idx) {
    activeYacht = idx;
    updateYachtDetail(yacht);
  });
  if (currentYachts.length > 0) {
    updateYachtDetail(currentYachts[0]);
  }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && yachtPicker) yachtPicker.snapTo(((activeYacht - 1) + currentYachts.length) % currentYachts.length);
  if (e.key === 'ArrowRight' && yachtPicker) yachtPicker.snapTo((activeYacht + 1) % currentYachts.length);
});

// Arrow button navigation on main image
document.getElementById('yachtNavLeft').addEventListener('click', () => {
  if (yachtPicker) yachtPicker.snapTo(((activeYacht - 1) + currentYachts.length) % currentYachts.length);
});
document.getElementById('yachtNavRight').addEventListener('click', () => {
  if (yachtPicker) yachtPicker.snapTo((activeYacht + 1) % currentYachts.length);
});

/* ══════════════════════════════════════
   CENTER OVERLAY UPDATE
   ══════════════════════════════════════ */
const centerMonthEl = document.getElementById('centerMonth');
const centerBarEl = document.getElementById('centerBar');
const centerPctEl = document.getElementById('centerPct');
const centerPctLabelEl = document.getElementById('centerPctLabel');

function occLabel(occ) {
  if (occ >= 90) return 'Full';
  if (occ >= 70) return 'High';
  if (occ >= 50) return 'Mid';
  return 'Low';
}

function updateCenter(item, monthIdx) {
  centerMonthEl.textContent = item.full;
  centerBarEl.style.width = Math.max(10, item.occ) + '%';
  centerBarEl.style.background = occColor(item.occ);
  const c = occColor(item.occ);
  centerPctEl.textContent = item.occ + '%';
  centerPctEl.style.color = c;
  centerPctLabelEl.textContent = occLabel(item.occ);
  centerPctLabelEl.style.color = c;
  if (monthIdx !== currentMonthIdx) {
    currentMonthIdx = monthIdx;
    refreshYachts();
  }
}

   INIT
   ══════════════════════════════════════ */
const picker = createMonthPicker('monthPicker', months, 6, updateCenter);

// Country tabs
document.querySelectorAll('#countryTabs .country-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('#countryTabs .country-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCountry = tab.dataset.country;
    if (typeof setBgCountry === 'function') setBgCountry(currentCountry);
    months = buildMonths(currentCountry);
    picker.updateData(months);
    refreshYachts();
  });
});

// Initial load
refreshYachts();

// Align picker vertically with exposed yacht image center (below frosted header)
/* ── Layout mode detection ── */
const mobileQuery = window.matchMedia('(max-width: 600px)');
const tabletQuery = window.matchMedia('(max-width: 1024px)');

function isMobile() { return mobileQuery.matches; }
function isTablet() { return tabletQuery.matches && !mobileQuery.matches; }

function alignPicker() {
  const wrapper = document.getElementById('yachtPickerWrapper');
  if (!wrapper) return;
  // Hide picker on tablet/mobile via CSS, but also skip JS positioning
  if (tabletQuery.matches) return;
  const visual = document.getElementById('yachtVisual');
  const header = document.querySelector('.frosted-header');
  if (!visual) return;
  const vRect = visual.getBoundingClientRect();
  const headerH = header ? header.offsetHeight : 0;
  // Exposed image runs from (visual.top + headerH) to visual.bottom
  const exposedCenter = vRect.top + headerH + (vRect.height - headerH) / 2;
  wrapper.style.top = exposedCenter + 'px';
  wrapper.style.transform = 'translateY(-50%)';
}
alignPicker();

// Position mobile nav arrows at vertical center of yacht image
function alignMobileNavArrows() {
  if (!isMobile()) {
    // Reset to CSS-controlled positioning on desktop
    document.getElementById('yachtNavLeft').style.top = '';
    document.getElementById('yachtNavRight').style.top = '';
    return;
  }
  // Find the active image element
  var activeImg = document.querySelector('.yacht-visual-img[data-current]');
  if (!activeImg) return;
  var card = document.querySelector('.main-card');
  if (!card) return;
  var imgRect = activeImg.getBoundingClientRect();
  var cardRect = card.getBoundingClientRect();
  // Arrow center = image vertical center relative to card
  var arrowTop = (imgRect.top - cardRect.top) + (imgRect.height / 2) - 18; // 18 = half of 36px
  document.getElementById('yachtNavLeft').style.top = arrowTop + 'px';
  document.getElementById('yachtNavRight').style.top = arrowTop + 'px';
}
alignMobileNavArrows();
window.addEventListener('resize', function() { alignPicker(); alignMobileNavArrows(); });

// Re-align arrows after yacht image loads
var observer = new MutationObserver(function() { if (isMobile()) alignMobileNavArrows(); });
observer.observe(document.getElementById('yachtImgA'), { attributes: true, attributeFilter: ['data-current'] });
observer.observe(document.getElementById('yachtImgB'), { attributes: true, attributeFilter: ['data-current'] });

/* ══════════════════════════════════════
   IMAGE TRANSITION ENGINE + DEBUG PANEL
   Canvas 2D — universally reliable
   ══════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('transitionCanvas');
  const visual = document.getElementById('yachtVisual');
  const ctx = canvas.getContext('2d');

  function resize() {
    // On mobile, .yacht-visual is display:contents so use .yacht-image-row instead
    var ref = visual.offsetWidth > 0 ? visual : document.querySelector('.yacht-image-row');
    if (ref) {
      canvas.width = ref.offsetWidth;
      canvas.height = ref.offsetHeight;
    }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Noise helper (deterministic hash) ──
  function hash(x, y) {
    return ((Math.sin(x * 127.1 + y * 311.7) * 43758.5453) % 1 + 1) % 1;
  }

  // ── Draw image with "cover" behavior (like CSS object-fit: cover) ──
  function drawCover(c, img, dx, dy, dw, dh) {
    var iw = img.naturalWidth || img.width;
    var ih = img.naturalHeight || img.height;
    var scale = Math.max(dw / iw, dh / ih);
    var sw = dw / scale, sh = dh / scale;
    var sx = (iw - sw) / 2, sy = (ih - sh) / 2;
    c.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  }

  // ── Effect renderers: each takes (ctx, img1, img2, progress, w, h) ──
  const effects = {
    'cross-dissolve': {
      label: 'Cross Dissolve',
      render: function(c, i1, i2, p, w, h) {
        c.globalAlpha = 1;
        drawCover(c, i1, 0, 0, w, h);
        c.globalAlpha = p;
        drawCover(c, i2, 0, 0, w, h);
        c.globalAlpha = 1;
      },
    },
    'directional-wipe': {
      label: 'Directional Wipe',
      render: function(c, i1, i2, p, w, h) {
        drawCover(c, i1, 0, 0, w, h);
        var edge = w * 0.06;
        var x = p * (w + edge) - edge;
        c.save();
        c.beginPath();
        c.rect(0, 0, x, h);
        c.clip();
        drawCover(c, i2, 0, 0, w, h);
        c.restore();
      },
    },
    'radial-wipe': {
      label: 'Radial Wipe',
      render: function(c, i1, i2, p, w, h) {
        drawCover(c, i1, 0, 0, w, h);
        var maxR = Math.sqrt(w * w + h * h) / 2;
        c.save();
        c.beginPath();
        c.arc(w / 2, h / 2, p * maxR, 0, Math.PI * 2);
        c.clip();
        drawCover(c, i2, 0, 0, w, h);
        c.restore();
      },
    },
    'blinds': {
      label: 'Blinds',
      render: function(c, i1, i2, p, w, h) {
        drawCover(c, i1, 0, 0, w, h);
        var strips = 10;
        var sw = w / strips;
        c.save();
        c.beginPath();
        for (var s = 0; s < strips; s++) {
          var delay = s / strips * 0.3;
          var sp = Math.max(0, Math.min(1, (p - delay) / 0.7));
          if (sp > 0) c.rect(s * sw, 0, sw * sp, h);
        }
        c.clip();
        drawCover(c, i2, 0, 0, w, h);
        c.restore();
      },
    },
    'pixelate': {
      label: 'Pixelate',
      render: function(c, i1, i2, p, w, h) {
        var blockSize = Math.max(1, Math.round(Math.sin(p * Math.PI) * 40 + 1));
        // Draw source with cover, then pixelate by redrawing small→large
        drawCover(c, p < 0.5 ? i1 : i2, 0, 0, w, h);
        c.imageSmoothingEnabled = false;
        var tw = Math.max(1, Math.round(w / blockSize));
        var th = Math.max(1, Math.round(h / blockSize));
        c.drawImage(canvas, 0, 0, w, h, 0, 0, tw, th);
        c.drawImage(canvas, 0, 0, tw, th, 0, 0, w, h);
        c.imageSmoothingEnabled = true;
      },
    },
    'noise-dissolve': {
      label: 'Noise Dissolve',
      render: function(c, i1, i2, p, w, h) {
        // Pre-generate noise pattern (cached)
        if (!effects['noise-dissolve']._noise || effects['noise-dissolve']._nw !== w) {
          var cols = Math.ceil(w / 8);
          var rows = Math.ceil(h / 8);
          var n = [];
          for (var r = 0; r < rows; r++)
            for (var cl = 0; cl < cols; cl++)
              n.push(hash(cl, r));
          effects['noise-dissolve']._noise = n;
          effects['noise-dissolve']._cols = cols;
          effects['noise-dissolve']._rows = rows;
          effects['noise-dissolve']._nw = w;
        }
        drawCover(c, i1, 0, 0, w, h);
        var n = effects['noise-dissolve']._noise;
        var cols = effects['noise-dissolve']._cols;
        var rows = effects['noise-dissolve']._rows;
        // Clip to revealed regions (where noise < progress)
        c.save();
        c.beginPath();
        for (var r = 0; r < rows; r++) {
          for (var cl = 0; cl < cols; cl++) {
            if (n[r * cols + cl] < p) {
              c.rect(cl * 8, r * 8, 8, 8);
            }
          }
        }
        c.clip();
        drawCover(c, i2, 0, 0, w, h);
        c.restore();
      },
    },
    'displacement': {
      label: 'Displacement',
      render: function(c, i1, i2, p, w, h) {
        // Draw base with cover, then slice-shift for wave distortion
        drawCover(c, p < 0.5 ? i1 : i2, 0, 0, w, h);
        var sliceH = 4;
        var amp = Math.sin(p * Math.PI) * 20;
        // Copy current canvas content to shift slices
        var imgData = c.getImageData(0, 0, w, h);
        c.clearRect(0, 0, w, h);
        c.putImageData(imgData, 0, 0);
        for (var y = 0; y < h; y += sliceH) {
          var offset = Math.sin(y * 0.05 + p * 10) * amp;
          c.drawImage(canvas, 0, y, w, sliceH, offset, y, w, sliceH);
        }
        c.globalAlpha = p;
        drawCover(c, i2, 0, 0, w, h);
        c.globalAlpha = 1;
      },
    },
    'ripple': {
      label: 'Ripple',
      render: function(c, i1, i2, p, w, h) {
        // Draw base with cover, then slice-shift for ripple
        drawCover(c, p < 0.5 ? i1 : i2, 0, 0, w, h);
        var amp = Math.sin(p * Math.PI) * 12;
        var sliceH = 3;
        for (var y = 0; y < h; y += sliceH) {
          var dy = y - h / 2;
          var dist = Math.abs(dy) / (h / 2);
          var offset = Math.sin(dist * 20 - p * 15) * amp * (1 - dist);
          c.drawImage(canvas, 0, y, w, sliceH, offset, y, w, sliceH);
        }
        c.globalAlpha = p;
        drawCover(c, i2, 0, 0, w, h);
        c.globalAlpha = 1;
      },
    },
    'rgb-shift': {
      label: 'RGB Shift',
      render: function(c, i1, i2, p, w, h) {
        var shift = Math.sin(p * Math.PI) * 15;
        // Draw base
        c.globalAlpha = 1 - p;
        drawCover(c, i1, 0, 0, w, h);
        c.globalAlpha = p;
        drawCover(c, i2, 0, 0, w, h);
        c.globalAlpha = 1;
        // RGB channel shift overlay
        c.globalCompositeOperation = 'lighter';
        c.globalAlpha = 0.15;
        c.drawImage(p < 0.5 ? i1 : i2, shift, 0, w, h);
        c.drawImage(p < 0.5 ? i1 : i2, -shift, 0, w, h);
        c.globalCompositeOperation = 'source-over';
        c.globalAlpha = 1;
      },
    },
    'particle-dissolve': {
      label: 'Particle Dissolve',
      render: function(c, i1, i2, p, w, h) {
        drawCover(c, i2, 0, 0, w, h);
        // Draw old image in scattered blocks that disappear
        var blockSize = 12;
        var cols = Math.ceil(w / blockSize);
        var rows = Math.ceil(h / blockSize);
        for (var r = 0; r < rows; r++) {
          for (var cl = 0; cl < cols; cl++) {
            var h2 = hash(cl + 0.5, r + 0.5);
            if (h2 > p) {
              c.drawImage(i1, cl * blockSize, r * blockSize, blockSize, blockSize,
                cl * blockSize, r * blockSize, blockSize, blockSize);
            }
          }
        }
      },
    },
  };

  const effectKeys = Object.keys(effects);

  // ── Image loading + cache ──
  const imgCache = {};
  function loadImg(url, cb) {
    if (imgCache[url]) { cb(imgCache[url]); return; }
    var img = new Image();
    img.onload = function() { imgCache[url] = img; cb(img); };
    img.src = url;
  }

  // ── Transition state ──
  let currentEffect = 'cross-dissolve';
  let img1 = null, img2 = null;
  let transitioning = false;
  let transitionStart = 0;
  const DURATION = 1200;

  function renderFrame() {
    if (!transitioning || !img1 || !img2) return;
    var elapsed = performance.now() - transitionStart;
    var raw = Math.min(1.0, elapsed / DURATION);
    // Ease in-out
    var p = raw < 0.5 ? 2 * raw * raw : 1 - Math.pow(-2 * raw + 2, 2) / 2;

    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    var fx = effects[currentEffect];
    if (fx) fx.render(ctx, img1, img2, p, w, h);

    if (raw < 1.0) {
      requestAnimationFrame(renderFrame);
    } else {
      canvas.style.opacity = '0';
      transitioning = false;
    }
  }

  // ── Public API ──
  window.triggerTransition = function(fromUrl, toUrl, onCanvasReady) {
    if (currentEffect === 'none') return;
    resize();
    var loaded = 0;
    function check() {
      loaded++;
      if (loaded === 2 && img1 && img2) {
        // Show canvas with first frame (old image) BEFORE swapping underlying imgs
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawCover(ctx, img1, 0, 0, canvas.width, canvas.height);
        canvas.style.opacity = '1';
        // Now safe to swap underlying images — canvas covers them
        if (onCanvasReady) onCanvasReady();
        transitionStart = performance.now();
        transitioning = true;
        requestAnimationFrame(renderFrame);
      }
    }
    loadImg(fromUrl, function(i) { img1 = i; check(); });
    loadImg(toUrl, function(i) { img2 = i; check(); });
  };

  // ── DEBUG PANEL ──
  var panel = document.createElement('div');
  panel.id = 'debugPanel';
  panel.innerHTML =
    '<div style="font-weight:600;margin-bottom:8px;font-size:13px;color:#0d9488;">Transition FX</div>' +
    '<select id="fxSelect" style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);font-size:12px;background:#fff;cursor:pointer;">' +
    '<option value="none">None (CSS fade)</option>' +
    effectKeys.map(function(k) { return '<option value="' + k + '"' + (k === currentEffect ? ' selected' : '') + '>' + effects[k].label + '</option>'; }).join('') +
    '</select>' +
    '<button id="fxTest" style="width:100%;margin-top:8px;padding:6px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);font-size:12px;background:#f0faf9;cursor:pointer;">Test Transition</button>';
  panel.style.cssText = 'position:fixed;bottom:20px;left:20px;z-index:9999;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:12px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-family:Inter,sans-serif;width:180px;';
  panel.style.display = 'none';
  document.body.appendChild(panel);

  document.getElementById('fxSelect').addEventListener('change', function() {
    currentEffect = this.value;
  });

  document.getElementById('fxTest').addEventListener('click', function() {
    if (currentEffect === 'none') return;
    document.getElementById('yachtNavRight').click();
  });

  var panelVisible = false;
  document.addEventListener('keydown', function(e) {
    if (e.key === 'd' || e.key === 'D') {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      panelVisible = !panelVisible;
      panel.style.display = panelVisible ? 'block' : 'none';
    }
  });
})();

/* ══════════════════════════════════════
   CONTACT PANEL — "Button Clicked" STATE
   Supports Live and Offline modes
   ══════════════════════════════════════ */
(function() {
  var contactPanel = document.getElementById('contactPanel');
  var contactYachtImg = document.getElementById('contactYachtImg');
  var contactYachtName = document.getElementById('contactYachtName');
  var contactDescription = document.getElementById('contactDescription');
  var contactLiveIcon = document.getElementById('contactLiveIcon');
  var contactLiveBold = document.getElementById('contactLiveBold');
  var contactLiveDetail = document.getElementById('contactLiveDetail');
  var contactLiveYacht = document.getElementById('contactLiveYacht');
  var scheduleTitle = document.getElementById('scheduleTitle');
  var contactPanelOpen = false;
  var savedScrollTop = 0;

  // Toggle this to switch between Live/Offline states
  // In production, this would be driven by real-time crew status
  var crewIsLive = true;

  var contactOfflineMsg = document.getElementById('contactOfflineMsg');

  function applyCrewState() {
    var yachtName = contactYachtName.textContent || '';
    if (crewIsLive) {
      contactPanel.classList.remove('offline');
      contactDescription.textContent = 'See the yacht live - choose how you\'d like to connect. The crew is currently on board.';
      contactLiveIcon.style.display = '';
      contactLiveDetail.style.display = '';
      contactLiveYacht.textContent = yachtName;
      contactOfflineMsg.style.display = 'none';
      scheduleTitle.textContent = 'Schedule a Call';
    } else {
      contactPanel.classList.add('offline');
      contactDescription.textContent = 'The crew is currently off board. Schedule a call - they\'ll reach out to confirm a time.';
      contactLiveIcon.style.display = 'none';
      contactLiveDetail.style.display = 'none';
      contactOfflineMsg.style.display = '';
      scheduleTitle.textContent = 'Schedule a Call / Call me later';
    }
  }

  // ── Static side images for panel state (desktop) ──
  var panelSideLeft = document.getElementById('panelSideLeft');
  var panelSideRight = document.getElementById('panelSideRight');
  var pickerWrapper = document.getElementById('yachtPickerWrapper');

  function showPanelSideImages() {
    // Get prev/next yacht images from current filtered list
    if (typeof currentYachts === 'undefined' || currentYachts.length < 2) return;
    var idx = typeof activeYacht !== 'undefined' ? activeYacht : 0;
    var prevIdx = (idx - 1 + currentYachts.length) % currentYachts.length;
    var nextIdx = (idx + 1) % currentYachts.length;
    panelSideLeft.src = currentYachts[prevIdx].img;
    panelSideRight.src = currentYachts[nextIdx].img;

    // Position relative to the card
    var card = document.querySelector('.main-card');
    if (!card) return;
    var cardRect = card.getBoundingClientRect();
    var pageInner = document.querySelector('.page-inner');
    var innerRect = pageInner.getBoundingClientRect();

    // Figma: side images at 198px from card top
    var imgTop = (cardRect.top - innerRect.top) + 198;
    panelSideLeft.style.top = imgTop + 'px';
    panelSideRight.style.top = imgTop + 'px';

    // Figma: centered at ±316px from card center
    var cardCenterX = (cardRect.left - innerRect.left) + cardRect.width / 2;
    panelSideLeft.style.left = (cardCenterX - 316 - 328 / 2) + 'px';
    panelSideRight.style.left = (cardCenterX + 316 - 328 / 2) + 'px';

    // Hide the scrolling carousel, show static images
    if (pickerWrapper) pickerWrapper.style.display = 'none';
    panelSideLeft.classList.add('visible');
    panelSideRight.classList.add('visible');
  }

  function hidePanelSideImages() {
    panelSideLeft.classList.remove('visible');
    panelSideRight.classList.remove('visible');
    // Restore the scrolling carousel after fade-out transition completes
    setTimeout(function() {
      if (pickerWrapper) {
        pickerWrapper.style.display = '';
        if (window.innerWidth > 1024 && typeof alignPicker === 'function') {
          alignPicker();
        }
      }
    }, 500);
  }

  function openContactPanel() {
    if (contactPanelOpen) return;
    contactPanelOpen = true;

    // Copy current yacht image and name
    var currentImg = document.querySelector('.yacht-visual-img[data-current]');
    if (currentImg) contactYachtImg.src = currentImg.src;
    var nameEl = document.getElementById('yachtName');
    var nameMobile = document.getElementById('yachtNameMobile');
    var yachtName = (nameEl && nameEl.textContent) || (nameMobile && nameMobile.textContent) || '';
    contactYachtName.textContent = yachtName;

    // Apply live/offline state
    applyCrewState();

    // Stagger child elements for reveal
    var children = contactPanel.querySelectorAll('.contact-yacht-image, .contact-header, .contact-card, .contact-bottom');
    for (var i = 0; i < children.length; i++) {
      children[i].style.opacity = '0';
      children[i].style.transform = 'translateY(20px)';
      children[i].style.transition = 'none';
    }

    // Show static side images for panel state (desktop only)
    if (window.innerWidth > 1024) {
      showPanelSideImages();
    }

    // Activate panel
    contactPanel.classList.add('active');

    // Stagger reveal after a frame
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        for (var i = 0; i < children.length; i++) {
          children[i].style.transition = 'opacity 0.4s ease ' + (i * 0.06) + 's, transform 0.4s ease ' + (i * 0.06) + 's';
          children[i].style.opacity = '1';
          children[i].style.transform = 'translateY(0)';
        }
      });
    });

    // Lock scroll on mobile
    if (window.innerWidth <= 600) {
      var mainCard = document.querySelector('.main-card');
      if (mainCard) savedScrollTop = mainCard.scrollTop;
      document.body.style.overflow = 'hidden';
    }
  }

  function closeContactPanel() {
    if (!contactPanelOpen) return;
    contactPanelOpen = false;

    contactPanel.classList.remove('active');

    // Hide static side images, restore carousel (desktop)
    hidePanelSideImages();

    // Restore scroll on mobile
    document.body.style.overflow = '';
    if (window.innerWidth <= 600) {
      var mainCard = document.querySelector('.main-card');
      if (mainCard) mainCard.scrollTop = savedScrollTop;
    }
  }

  // CTA buttons — match by data-cta attribute (robust, no text matching)
  document.querySelectorAll('[data-cta="videocall"], [data-cta="callme"]').forEach(function(btn) {
    btn.addEventListener('click', openContactPanel);
  });

  // Close handlers — both mobile (image X) and desktop (header X) + Go Back
  document.getElementById('contactCloseBtn').addEventListener('click', closeContactPanel);
  document.getElementById('contactGoBack').addEventListener('click', closeContactPanel);
  document.getElementById('contactHeaderClose').addEventListener('click', closeContactPanel);

  // Escape key closes panel
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && contactPanelOpen) {
      closeContactPanel();
    }
  });

  // Block yacht navigation while panel is open
  document.addEventListener('keydown', function(e) {
    if (contactPanelOpen && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
      e.stopImmediatePropagation();
    }
  }, true);
})();
</script>
